version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tabreserve_db
    restart: always
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
      POSTGRES_DB: restaurant_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tabreserve_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tabreserve_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://booking_user:booking_password@db:5432/restaurant_booking
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=prodsecretkeyforrestaurantbookingsystem987654321
      # Razorpay & Cloudinary keys can be added here
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/static/uploads
      - backend_qrcodes:/app/static/qrcodes
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  backend_uploads:
  backend_qrcodes:
